# ===== CONFIGURAÇÕES BÁSICAS =====

# Trocar prefixo para Ctrl+a (mais fácil)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Dividir painéis com | e -
bind | split-window -h
bind - split-window -v

# Recarregar configuração
bind r source-file ~/.tmux.conf \; display "Configuração recarregada!"

# Habilitar mouse
set -g mouse on

# Numeração começando em 1
set -g base-index 1
setw -g pane-base-index 1

# ===== PERSONALIZAÇÃO DA STATUS BAR =====

gray='\033[38;2;61;65;66m' # Cinza claro

# Posição da status bar (top ou bottom)
set -g status-position bottom

# Intervalo de atualização da status bar (segundos)
set -g status-interval 5

# Comprimento da status bar
set -g status-left-length 50
set -g status-right-length 50

# === CORES DA STATUS BAR ===

# Cor de fundo da status bar
set -g status-bg black

# Cor do texto da status bar
set -g status-fg white

# === LADO ESQUERDO ===
# Mostra nome da sessão com cor
set -g status-left '#[fg=cyan,bold][#S]#[fg=white] '

# === CENTRO (janelas) ===
# Janela atual (ativa)
setw -g window-status-current-format '#[fg=cyan,bold]#I:#W#[fg=white]'

# Janelas inativas
setw -g window-status-format '#[fg=white]#I:#W#[fg=white]'

# Separador entre janelas
setw -g window-status-separator ' | '

# === LADO DIREITO ===
# Mostra data, hora e informações do sistema
set -g status-right '#[fg=white]%d-%m-%Y #[fg=white]| #[fg=white]%H:%M #[fg=white]| #[fg=white]#(whoami)@#h'

# === OUTRAS CORES ===

# Cor da borda do painel ativo
set -g pane-active-border-style 'fg=white'

# Cor da borda dos painéis inativos
set -g pane-border-style 'fg=white'

# Cor da mensagem de comando
set -g message-style 'fg=yellow,bg=black'

# ===== AUTO-CRIAÇÃO DE SESSÃO COM JANELAS PERSONALIZADAS =====

# Bind para criar sessão personalizada
bind N run-shell 'tmux-create-default-session'

# Hook que executa quando tmux server inicia
set-hook -g server-started 'run-shell "~/.tmux/create-session.sh"'

# ===== COMANDOS ÚTEIS EXTRAS =====

# Bind para matar sessão atual
bind X confirm-before -p "Matar sessão #S? (y/n)" kill-session

# Bind para renomear janela rapidamente  
bind R command-prompt -I "#W" "rename-window '%%'"

# Bind para criar nova janela com nome
bind C command-prompt -p "Nome da janela:" "new-window -n '%%'"

# ===== SCRIPT EMBUTIDO =====
# Cria arquivo de script automaticamente quando tmux inicia
run-shell 'mkdir -p ~/.tmux'
run-shell 'cat > ~/.tmux/create-session.sh << "EOF"
#!/bin/bash

SESSION_NAME="peak"

# Só cria se não existir sessão main
if ! tmux has-session -t $SESSION_NAME 2>/dev/null; then
    # Cria sessão
    tmux new-session -d -s $SESSION_NAME
    
    # Renomeia primeira janela para nvim
    tmux rename-window -t $SESSION_NAME:1
    
    # Cria segunda janela - commands
    tmux new-window -t $SESSION_NAME -n "nvim"
    
    # Cria terceira janela - random
    tmux new-window -t $SESSION_NAME -n "random"
    
    # Volta para primeira janela
    tmux select-window -t $SESSION_NAME:1
fi
EOF'

run-shell 'chmod +x ~/.tmux/create-session.sh'

# ===== ARQUIVO COMPARTILHADO PARA BASH/ZSH =====
# Cria ~/.tmux_aliases apenas se não existir
run-shell 'if [ ! -f ~/.tmux_aliases ]; then cat > ~/.tmux_aliases << "EOF"
# >>> tmux.conf aliases >>>

tmux_custom() {
    if [ $# -gt 0 ]; then
        command tmux "$@"
        return
    fi
    
    SESSION_NAME="peak"
    
    if command tmux has-session -t $SESSION_NAME 2>/dev/null; then
        command tmux attach-session -t $SESSION_NAME
    else
        # Cria sessão com janelas personalizadas
        command tmux new-session -d -s $SESSION_NAME
        command tmux rename-window -t $SESSION_NAME:1   
        command tmux new-window -t $SESSION_NAME -n "nvim"
        command tmux new-window -t $SESSION_NAME -n "random"
        command tmux select-window -t $SESSION_NAME:1
        command tmux attach-session -t $SESSION_NAME
    fi
}

if ! type tmux_custom > /dev/null 2>&1; then
    alias tmux=tmux_custom
fi

# <<< tmux.conf aliases <<<
EOF
fi'

# Garante que bashrc e zshrc vão dar source no arquivo
run-shell 'for rc in ~/.bashrc ~/.zshrc; do
    if [ -f "$rc" ] && ! grep -q "source ~/.tmux_aliases" "$rc"; then
        echo -e "\n# Carrega tmux aliases\n[ -f ~/.tmux_aliases ] && source ~/.tmux_aliases" >> $rc
    fi
done'

# Avisa que precisa recarregar o shell
run-shell 'echo "⚠️  Execute: source ~/.bashrc e/ou ~/.zshrc (para ativar a função tmux personalizada)"'
